# =============================================================================
# Docker Compose Override — Development Mode
# Enable with: docker-compose -f docker-compose.yml -f docker-compose.override.yml up
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Backend — Development
  # ---------------------------------------------------------------------------
  backend:
    build:
      target: builder
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro
    # Override healthcheck for dev (reload may cause brief unavailability)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Frontend — Development
  # ---------------------------------------------------------------------------
  frontend:
    build:
      target: builder
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    # Dev server healthcheck
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
